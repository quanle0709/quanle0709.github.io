<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng 10 Ngày Tuổi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🐶 Chúc Mừng Chó Con Tròn 10 Ngày Tuổi 🐶</h1>

        <div class="photo">
            <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=800"
                alt="Chó con">
        </div>

        <p class="message">
            Hôm nay là ngày đặc biệt! 🎉<br>
            Chúc bé cún luôn khỏe mạnh, mau ăn chóng lớn,
            ngoan ngoãn và mang thật nhiều niềm vui cho mọi người ❤️
        </p>

        <div class="counter">
            <span id="days">10</span> ngày tuổi
        </div>

        <button id="celebrateBtn">
            🎊 Bấm để chúc mừng 🎊
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
